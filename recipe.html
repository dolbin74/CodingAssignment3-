<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Recipe</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>My Recipe</h1>

<h2>Ingredients</h2>
<ul>
  <li>2 yellow onions eggs</li>
  <li> 1 tablespoon sugar</li>
  <li>1 to 2 dashes Tabasco sauce, to taste</li>
  <li>¼ teaspoon freshly ground black pepper</li>
  <li>3 cloves garlic</li>
  <li>1 cup rice</li>
  <li>1/2 cup milk</li>
  </ul>

<h2 class="rate">Rate This Recipe</h2>
<form>
  <fieldset style="width: 250px;">
    <legend>How difficult is this recipe?</legend>

    <label>
      <input type="radio" id="easy" name="difficulty" value="easy">
      Easy
    </label>

    <label>
      <input type="radio" id="med" name="difficulty" value="medium">
      Intermediate
    </label>

    <label>
      <input type="radio" id="hard" name="difficulty" value="hard">
      Hard
    </label>

  </fieldset>
</form>

<p>&nbsp;</p>

<h2>Conversion</h2>
<form>
  <input type="text" id="tblspn" name="tblspn">
  =
  <input type="text" id="cups" name="cups">
</form>
